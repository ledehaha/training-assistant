# ============================================
# 培训助手系统 - Docker Compose 配置
# ============================================
# 使用预构建镜像，无需在 NAS 上构建

services:
  app:
    image: node:20-alpine
    container_name: training-app
    restart: always
    working_dir: /app
    environment:
      - DATA_DIR=/data/db
      - FILE_STORAGE_PATH=/data/files
      - COZE_API_KEY=
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      # 挂载项目文件
      - ./app:/app:ro
      # 数据持久化
      - ./data:/data
    command: ["node", "server.js"]
