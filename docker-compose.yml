# ============================================
# 培训助手系统 - Docker Compose 配置
# ============================================
# 端口改为 5900，避免与群晖其他服务冲突

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training-app
    restart: always
    environment:
      - DATA_DIR=/data/db
      - FILE_STORAGE_PATH=/data/files
      - COZE_API_KEY=
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5900:5000"   # 外部访问 5900，映射到容器内部 5000
    volumes:
      - ./data:/data
