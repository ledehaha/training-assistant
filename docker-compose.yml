# ============================================
# 培训助手系统 - Docker Compose 配置
# ============================================
# 适用于群晖 Container Manager

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training-app
    restart: always
    environment:
      - DATA_DIR=/data/db
      - FILE_STORAGE_PATH=/data/files
      - COZE_API_KEY=
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      # 使用本地目录存储数据（更方便备份）
      - ./data:/data
