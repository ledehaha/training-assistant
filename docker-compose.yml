# ============================================
# 培训助手系统 - Docker Compose 配置
# ============================================
# 使用方法：
#   首次部署: docker compose up -d
#   更新应用: docker compose up -d --build
#   查看日志: docker compose logs -f
#   停止服务: docker compose down

services:
  # ============================================
  # 培训助手应用
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training-app
    restart: always
    environment:
      # SQLite 数据库路径
      DATABASE_PATH: /data/training.db
      # Coze API（必须配置）
      COZE_API_KEY: ${COZE_API_KEY}
      COZE_BUCKET_ENDPOINT_URL: ${COZE_BUCKET_ENDPOINT_URL}
      COZE_BUCKET_NAME: ${COZE_BUCKET_NAME}
      # 应用配置
      NODE_ENV: production
      PORT: 5000
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    volumes:
      # 数据持久化 - SQLite 数据库文件
      - ./data:/data
    # 资源限制（可选，根据 NAS 配置调整）
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# ============================================
# 网络
# ============================================
networks:
  default:
    driver: bridge
