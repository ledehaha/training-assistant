name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 支持手动触发部署

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || 22 }}
          script: |
            echo "🚀 开始部署..."
            
            # 进入项目目录
            cd ${{ secrets.ECS_PROJECT_PATH || '/var/www/training-assistant' }}
            
            # 拉取最新代码
            echo "📦 拉取最新代码..."
            git pull origin ${{ github.ref_name }}
            
            # 安装依赖
            echo "📥 安装依赖..."
            pnpm install
            
            # 构建项目
            echo "🔨 构建项目..."
            pnpm run build
            
            # 重启服务
            echo "🔄 重启服务..."
            pm2 restart training-assistant || pm2 start pnpm --name "training-assistant" -- start
            
            echo "✅ 部署完成！"
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"
