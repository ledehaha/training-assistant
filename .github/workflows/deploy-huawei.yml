name: Deploy to Huawei Cloud ECS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 支持手动触发部署

jobs:
  deploy:
    name: Deploy to Huawei ECS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Huawei ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HUAWEI_ECS_HOST }}
          username: ${{ secrets.HUAWEI_ECS_USERNAME }}
          key: ${{ secrets.HUAWEI_ECS_SSH_KEY }}
          port: ${{ secrets.HUAWEI_ECS_SSH_PORT || 22 }}
          script: |
            echo "🚀 开始部署到华为云..."
            
            # 项目目录（首次需要手动创建并 git clone）
            PROJECT_DIR="${{ secrets.HUAWEI_PROJECT_PATH || '/var/www/training-assistant' }}"
            cd $PROJECT_DIR
            
            # 拉取最新代码
            echo "📦 拉取最新代码..."
            git pull origin ${{ github.ref_name }}
            
            # 安装依赖
            echo "📥 安装依赖..."
            pnpm install
            
            # 构建项目
            echo "🔨 构建项目..."
            pnpm run build
            
            # 确保 data 目录存在
            mkdir -p $PROJECT_DIR/data
            
            # 重启服务
            echo "🔄 重启服务..."
            if pm2 list | grep -q "training-assistant"; then
              pm2 restart training-assistant
            else
              pm2 start pnpm --name "training-assistant" -- start
            fi
            
            echo "✅ 部署完成！"
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "访问地址: http://$(curl -s ifconfig.me):5000"

  # 可选：部署成功通知
  notify:
    name: Notify deployment status
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ 部署成功！"
          else
            echo "❌ 部署失败，请检查日志"
          fi
